name: Beyan v2 Tests

on:
  push:
    branches: [ main, v2.0-agentic-framework ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml pytest tiktoken
    - name: Run v2 tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/v2
        python -m pytest v2/tests/ -v
