name: Beyan v2.0 — CI Quality Gate

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  integrity:
    name: System Integrity Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Integrity Verification
        run: .\tools\verify_integrity.ps1
        shell: pwsh

  security:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit bandit

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit --requirement requirements.txt

      - name: Static security analysis (bandit)
        run: bandit -r cli/ -ll --exit-zero

      - name: Run unit tests with coverage
        run: pytest tests/ -v --cov=cli --cov-report=term-missing --cov-fail-under=60

  lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linter
        run: pip install flake8

      - name: Lint CLI modules
        run: flake8 cli/ --max-line-length=120 --ignore=E501,W503
