# Request Pattern Recognition
request_patterns:
  "feature gap": ["feature_gap_analysis"]
  "compare features": ["feature_gap_analysis"]
  "competitive analysis": ["feature_gap_analysis"]
  "what features missing": ["feature_gap_analysis"]
  "benchmark": ["feature_gap_analysis"]
  
  "test": ["test_generation", "testing_strategy"]
  "testing": ["test_generation", "testing_strategy"]
  "test coverage": ["test_generation"]
  "generate tests": ["test_generation"]
  "bdd": ["test_generation"]
  
  "ui test": ["ui_interaction_test"]
  "cypress": ["ui_interaction_test"]
  "playwright": ["ui_interaction_test"]
  "visual builder": ["ui_interaction_test"]
  "drag drop": ["ui_interaction_test"]
  "canvas": ["ui_interaction_test"]
  
  "collaboration": ["collaboration_test"]
  "real-time": ["collaboration_test"]
  "websocket": ["collaboration_test"]
  "multi-user": ["collaboration_test"]
  
  "project intel": ["project_intelligence"]
  "auto analysis": ["project_intelligence"]
  "recommend modules": ["project_intelligence"]
  "what modules": ["project_intelligence"]
  
  "algo": ["algo_complete"]
  "algorithm": ["algo_complete"]
  "algorithm test": ["algo_complete"]
  "algorithm validation": ["algo_complete"]
  "property based": ["algo_complete"]
  "mathematical": ["algo_complete"]

# Module Groups for Common Scenarios
module_groups:
  testing_full:
    modules: ["test_generation", "ui_interaction_test", "collaboration_test", "testing_strategy"]
    description: "Complete testing analysis suite"
    total_tokens: 14000
  
  quality_focus:
    modules: ["test_generation", "ai_assisted_dev_analysis", "hidden_gems_deep_scan", "refactoring_guide"]
    description: "Code quality and testing focus"
    total_tokens: 10500
  
  ui_complete:
    modules: ["ui_interaction_test", "accessibility_analysis", "mobile_responsive_analysis", "browser_compatibility"]
    description: "Complete UI testing and compatibility"
    total_tokens: 8000
  
  collaboration_suite:
    modules: ["collaboration_test", "ui_interaction_test", "performance_analysis"]
    description: "Collaboration features testing"
    total_tokens: 10500
  
  algorithm_validation:
    modules: ["algo_complete", "test_generation", "performance_analysis"]
    description: "Mathematical algorithm validation suite"
    total_tokens: 14500

# Preset Combinations (shortcuts)
presets:
  BASIC: ["file_structure_analysis", "security_analysis", "performance_analysis"]
  FULLSTACK: ["file_structure_analysis", "security_analysis", "performance_analysis", "api_design_analysis", "database_analysis", "ui_ux_analysis", "developer_experience"]
  TEST-FULL: ["test_generation", "ui_interaction_test", "collaboration_test", "testing_strategy"]
  QUALITY: ["test_generation", "ai_assisted_dev_analysis", "hidden_gems_deep_scan", "refactoring_guide"]
  UI-COMPLETE: ["ui_interaction_test", "accessibility_analysis", "mobile_responsive_analysis", "browser_compatibility", "ui_ux_analysis"]
  ALGO-SUITE: ["algo_complete", "test_generation", "performance_analysis"]
  E2E-SUITE: ["test_generation", "ui_interaction_test", "collaboration_test", "testing_strategy"]

# Implementation Guides (Step-by-step fix guides)
implementation_guides:
  security_fixes:
    path: "implementation-guides/security-fixes.md"
    related_module: "security_analysis"
    description: "Step-by-step guide to fix security issues (SQL injection, secrets, authorization, etc.)"
    topics: ["SQL injection", "exposed secrets", "authorization", "CORS", "password hashing"]
  
  performance_optimization:
    path: "implementation-guides/performance-optimization.md"
    related_module: "performance_analysis"
    description: "Step-by-step guide to optimize performance (bundle size, images, N+1 queries, etc.)"
    topics: ["bundle size", "image optimization", "N+1 queries", "database indexes", "caching"]
  
  accessibility_fixes:
    path: "implementation-guides/accessibility-fixes.md"
    related_module: "accessibility_analysis"
    description: "Step-by-step guide to fix accessibility issues (alt text, contrast, keyboard navigation)"
    topics: ["alt text", "color contrast", "keyboard navigation", "ARIA labels"]
  
  database_migration:
    path: "implementation-guides/database-migration.md"
    related_module: "database_analysis"
    description: "Safe database migration strategy (backup, staging, rollback, production)"
    topics: ["migration safety", "backup", "rollback", "staging tests"]
