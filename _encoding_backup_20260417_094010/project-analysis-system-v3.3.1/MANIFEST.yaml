    version: "1.0.0"

  # SPECIALIZED (Tech/Domain specific)
  turkish_market_specifics:
    path: "modules/specialized/turkish-market.md"
    tokens: 1500
    priority: P2
    auto_load_if: ["turkish", "turkey", "tr"]
