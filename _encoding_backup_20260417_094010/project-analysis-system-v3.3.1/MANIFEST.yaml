    auto_load: false
    dependencies: []
    tags: [i18n, l10n, localization]
    version: "1.0.0"
    
  testing_strategy:
    path: "modules/testing/testing-strategy.md"
    tokens: 2000
    priority: P2
    auto_load_if: ["mature_project", "production"]
    dependencies: []
    tags: [testing, qa, coverage, strategy]
    version: "1.0.0"
    
  state_management_analysis:
    path: "modules/core/state-management.md"
    tokens: 1800
    priority: P2
    auto_load_if: ["react", "vue", "spa"]
    dependencies: []
    tags: [state, redux, context, zustand]
    version: "1.0.0"
  
  monitoring_observability:
    path: "modules/core/monitoring-observability.md"
    tokens: 2000
    priority: P2
    auto_load: false
    dependencies: []
    tags: [monitoring, logging, observability]
    version: "1.0.0"
  
  code_quality_patterns:
    path: "modules/core/code-quality-patterns.md"
    tokens: 1800
    priority: P2
    auto_load: false
    dependencies: []
    tags: [code-quality, patterns, best-practices]
    version: "1.0.0"

  # P3 - OPTIONAL
  mobile_responsive_analysis:
    path: "modules/core/mobile-responsive.md"
    tokens: 800
    priority: P3
    auto_load: false
    dependencies: []
    tags: [mobile, responsive, breakpoints]
    version: "1.0.0"
    
  browser_compatibility:
    path: "modules/core/browser-compatibility.md"
    tokens: 600
    priority: P3
    auto_load: false
    dependencies: []
    tags: [browser, compatibility, cross-browser]
    version: "1.0.0"
    
  seo_analysis:
    path: "modules/core/seo-analysis.md"
    tokens: 800
    priority: P3
    auto_load: false
    dependencies: []
    tags: [seo, meta-tags, sitemap]
    version: "1.0.0"
    
  analytics_analysis:
