# Project Analysis System - Module Manifest v3.3.1
# Updated with implementation guides organization

version: "3.3.1"
base_prompt: "BASE_PROMPT.md"
base_token_count: 5000
max_total_tokens: 30000

# Module Catalog (30 modules total)
modules:
  # P0 - CRITICAL (Load almost always)
  project_intelligence:
    path: "modules/specialized/project-intelligence.md"
    tokens: 5000
    priority: P0
    auto_load: false
    load_on_request: true
    dependencies: []
    tags: [meta, orchestrator, auto-analysis, intelligence]
    version: "1.0.0"
    description: "Meta-orchestrator that analyzes projects and recommends modules"
  
  file_structure_analysis:
    path: "modules/core/file-structure-analysis.md"
    tokens: 2000
    priority: P0
    auto_load: true
    dependencies: []
    tags: [core, structure, organization]
    version: "1.0.0"
    
  performance_analysis:
    path: "modules/core/performance-analysis.md"
    tokens: 2500
    priority: P0
    auto_load_if: ["web_app", "api", "mobile_app"]
    dependencies: []
    tags: [performance, optimization, web-vitals]
    version: "1.0.0"
    
  ui_ux_analysis:
    path: "modules/core/ui-ux-analysis.md"
    tokens: 3000
    priority: P0
    auto_load_if: ["web_app", "mobile_app", "spa"]
    dependencies: []
    recommends: ["accessibility_analysis"]
    tags: [ui, ux, frontend, design]
    version: "1.0.0"
  
  security_analysis:
    path: "modules/core/security-analysis.md"
    tokens: 2800
    priority: P0
    auto_load_if: ["production", "handles_pii", "financial"]
    dependencies: []
    tags: [security, vulnerabilities, auth]
    version: "1.0.0"

  # P1 - HIGH (Load based on project type)
  api_design_analysis:
    path: "modules/core/api-design-analysis.md"
    tokens: 2000
    priority: P1
    auto_load_if: ["api", "backend", "microservices"]
    dependencies: []
    recommends: ["security_analysis"]
    tags: [api, rest, graphql, backend]
    version: "1.0.0"
    
  database_analysis:
    path: "modules/core/database-analysis.md"
    tokens: 2500
    priority: P1
    auto_load_if: ["backend", "fullstack", "data_intensive"]
    dependencies: []
    recommends: ["performance_analysis"]
    tags: [database, sql, queries, schema]
    version: "1.0.0"
    
  developer_experience:
    path: "modules/core/developer-experience.md"
    tokens: 1800
    priority: P1
    auto_load_if: ["team_size_gt_3"]
    dependencies: []
    tags: [dx, tooling, workflow]
    version: "1.0.0"
  
  test_generation:
    path: "modules/testing/test-generation.md"
    tokens: 4000
    priority: P1
    auto_load_if: ["low_test_coverage", "test_request"]
    dependencies: []
    recommends: ["ui_interaction_test", "collaboration_test"]
    tags: [testing, bdd, test-gen, gherkin, jest, xunit, pytest]
    version: "1.0.0"
    description: "Generates BDD-style test scenarios and executable tests"
  
  ui_interaction_test:
    path: "modules/testing/ui-interaction-test.md"
    tokens: 4500
    priority: P1
    auto_load_if: ["visual_builder", "canvas", "drag_drop", "ui_request"]
    dependencies: []
    recommends: ["test_generation"]
    tags: [testing, ui, cypress, playwright, interaction]
    version: "1.0.0"
    description: "Generic UI interaction testing for visual builders and UI apps"
  
  collaboration_test:
    path: "modules/testing/collaboration-test.md"
    tokens: 3500
    priority: P1
    auto_load_if: ["websocket", "signalr", "real_time", "collaboration"]
    dependencies: []
    recommends: ["ui_interaction_test", "performance_analysis"]
    tags: [testing, collaboration, websocket, multi-user, real-time]
    version: "1.0.0"
    description: "Real-time collaboration and multi-user testing"
  
  hidden_gems_deep_scan:
    path: "modules/specialized/hidden-gems-deep-scan.md"
    tokens: 2500
    priority: P1
    auto_load: false
    dependencies: ["file_structure_analysis"]
    tags: [code-quality, zombie-code, bus-factor, technical-debt]
    version: "1.0.0"
  
  ai_assisted_dev_analysis:
    path: "modules/specialized/ai-assisted-dev-analysis.md"
    tokens: 2500
    priority: P1
    auto_load_if: ["trae_ide", "cursor", "copilot"]
    dependencies: []
    tags: [ai, code-gen, automation, hallucination]
    version: "1.0.0"
  
  feature_gap_analysis:
    path: "modules/specialized/feature-gap-analysis.md"
    tokens: 2500
    priority: P2
    auto_load: false
    dependencies: []
    load_on_request: true
    tags: [competitive-analysis, benchmarking, features, roadmap]
    version: "1.0.0"
    description: "Analyzes feature completeness vs industry standards"

  # P2 - MEDIUM (Load on explicit request)
  accessibility_analysis:
